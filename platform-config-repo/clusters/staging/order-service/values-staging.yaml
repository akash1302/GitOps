serviceName: order-service
environment: staging

image:
  repository: 222222222222.dkr.ecr.us-east-1.amazonaws.com/order-service
  tag: "ghi9012"
  pullPolicy: IfNotPresent

replicaCount: 2

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::222222222222:role/staging-order-service-irsa

podDisruptionBudget:
  enabled: true
  minAvailable: 1
