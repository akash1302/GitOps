# ============================================================
# FILE: platform-config-repo/apps/staging/payment-service.yaml
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payment-service-staging
  namespace: argocd
  labels:
    app: payment-service
    environment: staging
spec:
  project: staging-project
  source:
    repoURL: git@gitlab.company.com:platform/platform-config-repo.git
    targetRevision: main
    path: helm-charts/generic-service
    helm:
      valueFiles:
        - values.yaml
        - ../../clusters/staging/payment-service/values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: staging-payment-service
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
