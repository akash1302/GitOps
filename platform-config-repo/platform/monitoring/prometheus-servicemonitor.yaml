# =============================================================================
# ServiceMonitors — Prometheus auto-discovery for all microservices
# Assumes: kube-prometheus-stack installed
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: microservices-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - prod-user-service
      - prod-payment-service
      - prod-order-service
  selector:
    matchLabels:
      app.kubernetes.io/managed-by: Helm
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
