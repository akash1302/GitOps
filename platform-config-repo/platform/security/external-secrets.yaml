# =============================================================================
# ExternalSecrets — pulls secrets from AWS Secrets Manager into Kubernetes
# Requires: External Secrets Operator installed in cluster
# =============================================================================

# ClusterSecretStore — one per cluster, uses IRSA to authenticate to AWS
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
---
# Example ExternalSecret for user-service DB credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: user-service-db-secret
  namespace: prod-user-service
spec:
  refreshInterval: 1h        # How often to sync from AWS
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: user-service-db-secret   # The Kubernetes Secret name created
    creationPolicy: Owner
  data:
    - secretKey: host              # Key in Kubernetes Secret
      remoteRef:
        key: /prod/user-service/db # Path in AWS Secrets Manager
        property: host
    - secretKey: password
      remoteRef:
        key: /prod/user-service/db
        property: password
---
# Example ExternalSecret for payment-service Stripe keys
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: payment-secrets
  namespace: prod-payment-service
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: payment-secrets
    creationPolicy: Owner
  data:
    - secretKey: stripe-key
      remoteRef:
        key: /prod/payment-service/stripe
        property: api_key
