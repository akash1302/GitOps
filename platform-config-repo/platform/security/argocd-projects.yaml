# =============================================================================
# ArgoCD AppProjects — RBAC at the project level
# Each environment has its own project with restricted source repos and
# destination clusters. This prevents cross-environment deployments.
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: dev-project
  namespace: argocd
spec:
  description: "DEV environment — all services"
  sourceRepos:
    - "git@gitlab.company.com:platform/platform-config-repo.git"
  destinations:
    - namespace: "dev-*"         # Only dev-* namespaces
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "apps"
      kind: Deployment
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: "autoscaling"
      kind: HorizontalPodAutoscaler
    - group: "networking.k8s.io"
      kind: Ingress
    - group: "policy"
      kind: PodDisruptionBudget
  roles:
    - name: dev-deployer
      description: "CI pipeline deployer for dev"
      policies:
        - p, proj:dev-project:dev-deployer, applications, sync, dev-project/*, allow
      groups:
        - dev-team
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: staging-project
  namespace: argocd
spec:
  description: "STAGING environment"
  sourceRepos:
    - "git@gitlab.company.com:platform/platform-config-repo.git"
  destinations:
    - namespace: "staging-*"
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "apps"
      kind: Deployment
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: "autoscaling"
      kind: HorizontalPodAutoscaler
    - group: "networking.k8s.io"
      kind: Ingress
    - group: "policy"
      kind: PodDisruptionBudget
  roles:
    - name: staging-deployer
      policies:
        - p, proj:staging-project:staging-deployer, applications, sync, staging-project/*, allow
      groups:
        - senior-dev-team
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: prod-project
  namespace: argocd
spec:
  description: "PRODUCTION environment — manual sync only"
  sourceRepos:
    - "git@gitlab.company.com:platform/platform-config-repo.git"
  destinations:
    - namespace: "prod-*"
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "apps"
      kind: Deployment
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: "autoscaling"
      kind: HorizontalPodAutoscaler
    - group: "networking.k8s.io"
      kind: Ingress
    - group: "policy"
      kind: PodDisruptionBudget
  roles:
    - name: prod-deployer
      description: "Only platform team can sync prod"
      policies:
        - p, proj:prod-project:prod-deployer, applications, sync, prod-project/*, allow
      groups:
        - platform-team         # ONLY platform team, not developers
